<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f7f4ef">
    <title>コードマップ</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css?v=8">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>コードマップ</h1>
          <p id="selectionText">コードを選ぶと、進行先と鍵盤が光ります。</p>
        </div>
        <div class="toolbar" aria-label="表示操作">
          <select id="keySelect" aria-label="キー"></select>
          <button id="resetButton" type="button">解除</button>
          <button id="bluesScaleButton" type="button" aria-pressed="false">ブルース</button>
          <select id="patternSelect" aria-label="進行パターン">
            <option value="">進行パターン</option>
          </select>
          <button id="playPatternButton" type="button">再生</button>
        </div>
      </header>

      <section class="stage" aria-label="コード進行グラフ">
        <svg id="graph" role="img" aria-label="コードのつながり"></svg>
      </section>

      <section class="keyboard-panel" aria-label="ピアノ鍵盤">
        <div id="keyboard" class="keyboard"></div>
        <div id="chordDetails" class="chord-details" aria-live="polite">
          <span class="detail-label">コードトーン</span>
          <span id="chordToneText">-</span>
          <span class="detail-label">テンション</span>
          <span id="tensionText">-</span>
        </div>
      </section>
    </main>

    <script src="vendor/d3.v7.min.js"></script>
    <script src="app.js?v=8"></script>
  </body>
</html>
